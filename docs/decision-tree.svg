<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" font-family="-apple-system,Segoe UI,Inter,sans-serif" role="img" aria-label="SHINE decision-tree flowchart — 20 rules mapping prompts to outputs">
  <title>SHINE decision tree — prompt → rule → tool chain → output</title>
  <desc>Flowchart showing how the 20 decision rules in CLAUDE.md route an incoming prompt to the right tool chain and output. Rules are grouped by intent: engineering (plan/implement/debug), review, research, safety, agency (client comms, proposals, lead enrichment, GDPR).</desc>

  <defs>
    <linearGradient id="gCore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fdf2f8"/><stop offset="1" stop-color="#fce7f3"/>
    </linearGradient>
    <linearGradient id="gEng" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/><stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="gAgency" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/><stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="gSafety" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef2f2"/><stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
    <style>
      .node { rx:10; ry:10; stroke:#94a3b8; stroke-width:1; }
      .title { font-size:22px; font-weight:700; fill:#0f172a; }
      .sub { font-size:12px; fill:#64748b; }
      .lbl { font-size:13px; fill:#0f172a; }
      .ruleTag { font-size:11px; font-weight:700; fill:#475569; }
      .band { font-size:14px; font-weight:700; fill:#334155; letter-spacing:1px; }
      .edge { stroke:#94a3b8; stroke-width:1.4; fill:none; marker-end:url(#arrow); }
    </style>
  </defs>

  <!-- Title -->
  <text x="600" y="36" text-anchor="middle" class="title">SHINE — Decision Tree of the 20 Rules</text>
  <text x="600" y="56" text-anchor="middle" class="sub">How a prompt is routed to the right tool chain and output. Source: ~/.claude/CLAUDE.md §Decision rules.</text>

  <!-- Central prompt node -->
  <rect class="node" x="500" y="80" width="200" height="52" fill="url(#gCore)" stroke="#be185d"/>
  <text x="600" y="105" text-anchor="middle" class="lbl" font-weight="700">User prompt</text>
  <text x="600" y="122" text-anchor="middle" class="sub">(any natural-language ask)</text>

  <!-- Bands: Engineering / Review-Research / Safety / Agency -->
  <text x="130" y="170" class="band">ENGINEERING</text>
  <text x="430" y="170" class="band">REVIEW &amp; RESEARCH</text>
  <text x="730" y="170" class="band">SAFETY &amp; CONTEXT</text>
  <text x="1020" y="170" class="band">AGENCY</text>

  <!-- Engineering column -->
  <g>
    <rect class="node" x="30" y="190" width="230" height="64" fill="url(#gEng)"/>
    <text x="45" y="210" class="ruleTag">RULE #1</text>
    <text x="45" y="230" class="lbl">"plan / strategy / roadmap"</text>
    <text x="45" y="247" class="sub">→ shine-planner agent</text>

    <rect class="node" x="30" y="270" width="230" height="64" fill="url(#gEng)"/>
    <text x="45" y="290" class="ruleTag">RULE #2</text>
    <text x="45" y="310" class="lbl">"implement / build / code"</text>
    <text x="45" y="327" class="sub">→ shine-executor agent</text>

    <rect class="node" x="30" y="350" width="230" height="64" fill="url(#gEng)"/>
    <text x="45" y="370" class="ruleTag">RULE #3</text>
    <text x="45" y="390" class="lbl">"why / error / broken"</text>
    <text x="45" y="407" class="sub">→ shine-debugger agent</text>

    <rect class="node" x="30" y="430" width="230" height="64" fill="url(#gEng)"/>
    <text x="45" y="450" class="ruleTag">RULE #5 · #6</text>
    <text x="45" y="470" class="lbl">"refactor / optimise"</text>
    <text x="45" y="487" class="sub">→ shine-refactorer / shine-perf</text>

    <rect class="node" x="30" y="510" width="230" height="64" fill="url(#gEng)"/>
    <text x="45" y="530" class="ruleTag">RULE #15</text>
    <text x="45" y="550" class="lbl">"long investigation"</text>
    <text x="45" y="567" class="sub">→ sub-agent via Task tool</text>
  </g>

  <!-- Review & Research column -->
  <g>
    <rect class="node" x="320" y="190" width="240" height="64" fill="url(#gEng)"/>
    <text x="335" y="210" class="ruleTag">RULE #7</text>
    <text x="335" y="230" class="lbl">"review PR / code review"</text>
    <text x="335" y="247" class="sub">→ shine-review skill</text>

    <rect class="node" x="320" y="270" width="240" height="64" fill="url(#gEng)"/>
    <text x="335" y="290" class="ruleTag">RULE #8 · #9</text>
    <text x="335" y="310" class="lbl">"test / validate / audit"</text>
    <text x="335" y="327" class="sub">→ shine-test / shine-audit skills</text>

    <rect class="node" x="320" y="350" width="240" height="64" fill="url(#gEng)"/>
    <text x="335" y="370" class="ruleTag">RULE #11</text>
    <text x="335" y="390" class="lbl">library / framework Q</text>
    <text x="335" y="407" class="sub">→ context7 plugin (live docs)</text>

    <rect class="node" x="320" y="430" width="240" height="64" fill="url(#gEng)"/>
    <text x="335" y="450" class="ruleTag">RULE #12 · #13</text>
    <text x="335" y="470" class="lbl">web search / scrape</text>
    <text x="335" y="487" class="sub">→ Perplexity / Exa / Firecrawl</text>

    <rect class="node" x="320" y="510" width="240" height="64" fill="url(#gEng)"/>
    <text x="335" y="530" class="ruleTag">RULE #14</text>
    <text x="335" y="550" class="lbl">docs / API reference</text>
    <text x="335" y="567" class="sub">→ shine-doc-writer / ragdocs</text>
  </g>

  <!-- Safety & Context column -->
  <g>
    <rect class="node" x="620" y="190" width="240" height="64" fill="url(#gSafety)"/>
    <text x="635" y="210" class="ruleTag">RULE #4</text>
    <text x="635" y="230" class="lbl">write + risky path</text>
    <text x="635" y="247" class="sub">→ shine-prompt-guard (exit 2 if secret)</text>

    <rect class="node" x="620" y="270" width="240" height="64" fill="url(#gSafety)"/>
    <text x="635" y="290" class="ruleTag">RULE #16</text>
    <text x="635" y="310" class="lbl">factual claim</text>
    <text x="635" y="327" class="sub">→ verify live · watermark sources</text>

    <rect class="node" x="620" y="350" width="240" height="64" fill="url(#gSafety)"/>
    <text x="635" y="370" class="ruleTag">RULE #18</text>
    <text x="635" y="390" class="lbl">PII / personal data</text>
    <text x="635" y="407" class="sub">→ shine-gdpr-analyst check</text>

    <rect class="node" x="620" y="430" width="240" height="64" fill="url(#gSafety)"/>
    <text x="635" y="450" class="ruleTag">HOOK</text>
    <text x="635" y="470" class="lbl">context budget crossed</text>
    <text x="635" y="487" class="sub">→ shine-context-monitor nudge</text>

    <rect class="node" x="620" y="510" width="240" height="64" fill="url(#gSafety)"/>
    <text x="635" y="530" class="ruleTag">HOOK</text>
    <text x="635" y="550" class="lbl">client slug in prompt</text>
    <text x="635" y="567" class="sub">→ shine-client-detect pre-loads memory</text>
  </g>

  <!-- Agency column -->
  <g>
    <rect class="node" x="920" y="190" width="250" height="64" fill="url(#gAgency)"/>
    <text x="935" y="210" class="ruleTag">RULE #17</text>
    <text x="935" y="230" class="lbl">client + comms verb</text>
    <text x="935" y="247" class="sub">→ draft-email · load style + client</text>

    <rect class="node" x="920" y="270" width="250" height="64" fill="url(#gAgency)"/>
    <text x="935" y="290" class="ruleTag">RULE #19</text>
    <text x="935" y="310" class="lbl">"proposal / preventivo"</text>
    <text x="935" y="327" class="sub">→ MoSCoW · MD · 15% discount</text>

    <rect class="node" x="920" y="350" width="250" height="64" fill="url(#gAgency)"/>
    <text x="935" y="370" class="ruleTag">RULE #20</text>
    <text x="935" y="390" class="lbl">lead list mentioned</text>
    <text x="935" y="407" class="sub">→ lead-enrich · Apollo / Hunter</text>

    <rect class="node" x="920" y="430" width="250" height="64" fill="url(#gAgency)"/>
    <text x="935" y="450" class="ruleTag">RULE #10</text>
    <text x="935" y="470" class="lbl">tone correction</text>
    <text x="935" y="487" class="sub">→ shine-tone-calibrator · style-*.md</text>

    <rect class="node" x="920" y="510" width="250" height="64" fill="url(#gAgency)"/>
    <text x="935" y="530" class="ruleTag">RULE —</text>
    <text x="935" y="550" class="lbl">multi-client prompt</text>
    <text x="935" y="567" class="sub">→ pre-load both client-*.md files</text>
  </g>

  <!-- Edges from prompt to all four bands -->
  <path class="edge" d="M 550 132 C 430 160, 250 170, 145 190"/>
  <path class="edge" d="M 580 132 C 500 160, 470 170, 440 190"/>
  <path class="edge" d="M 620 132 C 700 160, 720 170, 740 190"/>
  <path class="edge" d="M 650 132 C 800 160, 950 170, 1045 190"/>

  <!-- Output band -->
  <rect class="node" x="30" y="640" width="1140" height="90" fill="url(#gCore)" stroke="#be185d"/>
  <text x="600" y="665" text-anchor="middle" class="band" fill="#831843">STRUCTURED OUTPUT (always)</text>
  <text x="600" y="690" text-anchor="middle" class="lbl">Plain-text reply · file diff · artefact (email, proposal, CSV) · 5-section report · Sources table · typed memory update</text>
  <text x="600" y="710" text-anchor="middle" class="sub">Every output path honors: factual-RAG discipline · GDPR-native · atomic git · reversible · watermarked when mixed facts + drafted prose.</text>

  <text x="30" y="770" class="sub">✦ Legend:  Engineering = blue · Review/Research = blue · Safety = red · Agency = green · Prompt/Output = pink.</text>
  <text x="30" y="790" class="sub">Full text of every rule: ~/.claude/CLAUDE.md (§Decision rules, §16 RAG, §17 tone, §18 GDPR). Hooks are always-on, independent of rules.</text>
  <text x="30" y="810" class="sub">Generated for the SHINE framework by diShine (dishine.it) · CC0 1.0.</text>
</svg>
