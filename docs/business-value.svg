    <g transform="translate(20,220)">
      <rect width="400" height="96" rx="10" fill="#0f172a" stroke="#38bdf8"/>
      <text x="200" y="24" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="700" fill="#e0f2fe">EXECUTION</text>

      <g transform="translate(14,38)">
        <rect width="118" height="48" rx="8" fill="#0e7490"/>
        <text x="59" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">138 skills</text>
        <text x="59" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#a5f3fc">slash commands</text>
      </g>
      <g transform="translate(141,38)">
        <rect width="118" height="48" rx="8" fill="#7c2d12"/>
        <text x="59" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">39 agents</text>
        <text x="59" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fed7aa">sub-agent tasks</text>
      </g>
      <g transform="translate(268,38)">
