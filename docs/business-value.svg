      <text x="200" y="42" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="10" fill="#bfdbfe">§16 RAG · §17 client email · §18 GDPR · §19 proposal · §20 lead enrichment</text>
    </g>

