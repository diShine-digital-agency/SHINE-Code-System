        <text x="59" y="20" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff">7 hooks</text>
        <text x="59" y="36" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#e9d5ff">lifecycle guards</text>
      </g>
    </g>

