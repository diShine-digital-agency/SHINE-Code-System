      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">⚖ GDPR question</text>
      <text x="14" y="35" font-size="11">"audit this scraping job"</text>
    </g>
  </g>

