      <text x="200" y="22" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#fee2e2">ALWAYS-ON GUARDRAILS</text>
      <text x="200" y="40" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" fill="#fecaca">RAG discipline · never-auto-send · GDPR · PreToolUse secret block</text>
