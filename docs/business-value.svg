  <text x="32" y="40" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="700" fill="#ffffff">SHINE — turn Claude Code into your agency's operating system</text>
  <text x="1168" y="40" text-anchor="end" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#e0f2fe">39 agents · 138 skills · 7 hooks · 16 plugins</text>

  <!-- ───── Column 1: INPUT ───── -->
  <g transform="translate(40,100)">
    <rect width="260" height="420" rx="16" fill="url(#inputGrad)" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="130" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#78350f">① YOUR BUSINESS INPUT</text>
    <text x="130" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#92400e">plain language · any of 4 tongues</text>

    <g transform="translate(20,72)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">📝 Client brief</text>
      <text x="14" y="35" font-size="11">"Proposta per CONTOSO SEO Q2"</text>
    </g>
    <g transform="translate(20,128)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">📬 Inbox thread</text>
      <text x="14" y="35" font-size="11">"reply to Jamie · ACME plan"</text>
    </g>
    <g transform="translate(20,184)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">📊 Lead list (CSV)</text>
      <text x="14" y="35" font-size="11">"enrich 120 prospects"</text>
    </g>
    <g transform="translate(20,240)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">🐞 Bug ticket</text>
      <text x="14" y="35" font-size="11">"checkout fails on Safari"</text>
    </g>
    <g transform="translate(20,296)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="220" height="44" rx="8" fill="#ffffff" stroke="#fcd34d"/>
      <text x="14" y="19" font-weight="700" fill="#92400e">🎯 Campaign idea</text>
      <text x="14" y="35" font-size="11">"launch plan for Q3"</text>
    </g>
