      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">📄 Proposal</text>
      <text x="14" y="35" font-size="11">MoSCoW · MD estimates · 15% discount</text>
    </g>
    <g transform="translate(20,128)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">✉ Client email draft</text>
      <text x="14" y="35" font-size="11">IT/EN/FR/ES · tone + CC preserved</text>
    </g>
    <g transform="translate(20,184)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">📊 Lead CSV + audit</text>
      <text x="14" y="35" font-size="11">verified-only · inferred flagged</text>
    </g>
    <g transform="translate(20,240)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">🛠 Fix + 5-section report</text>
      <text x="14" y="35" font-size="11">summary · details · sources · Qs · next</text>
    </g>
    <g transform="translate(20,296)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">🎯 Campaign brief</text>
      <text x="14" y="35" font-size="11">KPIs · budget · channels · risks</text>
    </g>
    <g transform="translate(20,352)" font-family="Inter, system-ui, sans-serif" font-size="12" fill="#1e293b">
      <rect width="300" height="44" rx="8" fill="#ffffff" stroke="#86efac"/>
      <text x="14" y="19" font-weight="700" fill="#047857">⚖ GDPR verdict</text>
      <text x="14" y="35" font-size="11">lawful-basis cited · action items</text>
    </g>
  </g>

  <!-- Arrows -->
  <g stroke="#475569" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <path d="M 305 310 L 335 310"/>
    <path d="M 785 310 L 815 310"/>
  </g>

  <!-- ───── Bottom ROI band ───── -->
  <g transform="translate(40,540)">
    <rect width="1120" height="44" rx="22" fill="url(#roiGrad)"/>
    <text x="24" y="28" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff">📈 Business impact</text>
    <text x="180" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">⏱ 3–8× faster drafting on repeatable deliverables</text>
    <text x="180" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">✓ tone + CC + terminology stay on-brand every time</text>
    <text x="540" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">🔒 GDPR-native, secret-blocking, audit-trail-ready</text>
    <text x="540" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">🧠 institutional memory survives staff churn</text>
    <text x="880" y="20" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">💶 lower reviewer time per artefact</text>
    <text x="880" y="36" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#ecfdf5">🚀 faster onboarding · zero tool-chain guesswork</text>
  </g>
</svg>
