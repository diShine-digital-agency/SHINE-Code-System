    <text x="220" y="32" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="700" fill="#e0f2fe">② SHINE ENGINE</text>
    <text x="220" y="52" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#94a3b8">20 decision rules · typed memory · guardrails</text>

